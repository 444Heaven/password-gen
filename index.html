<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="assets/icons/icon.png" type="image/x-icon">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
        <link rel="manifest" href="manifest.json">
        <title>Password Generator</title>
    </head>
<body>
    <div class="header">
        <img id="logo" src="assets/icons/dark-mode.png" alt="Logo" class="logo" onclick="toggleTheme()">
    </div>
    <div class="container">
        <h1>Password Generator</h1>
        <label for="length">Choose the Length (1-600):</label>
        <input type="number" id="length" min="1" max="600" value="100">
        <button id="generate">Generate</button>
        <br>
        <br>
        <label for="password" class="hidden">Generated Password:</label>
        <input type="text" id="password" class="hidden" readonly>
        <button id="copy" class="hidden">Copy</button>
    </div>
    <div class="created">
        <h6>created with 🤍 by Metodico</h6>
    </div>
    <script src="script.js"></script>
</body>
</html>
